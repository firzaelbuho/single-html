<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Tool</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-copy">
        <span class="eyebrow">Utility Workspace</span>
        <h1>JSON Tool</h1>
        <p>Simplify large JSON payloads by reducing repetitive arrays with a cleaner, faster dark workspace.</p>
      </div>
      <div class="hero-note">
        <span>Responsive</span>
        <span>Dark Theme</span>
        <span>Clipboard Ready</span>
      </div>
    </header>

    <main class="container">
      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Input JSON</h2>
            <p>Paste or format raw payloads before simplifying.</p>
          </div>
          <button id="formatBtn" class="btn secondary">Format</button>
        </div>
        <textarea id="jsonInput" placeholder="Paste your massive JSON here..."></textarea>
      </section>

      <section class="panel actions">
        <button id="simplifyBtn" class="btn primary">Simplify <span>&rarr;</span></button>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Simplified Output</h2>
            <p>Copy the reduced structure once it's ready.</p>
          </div>
          <button id="copyBtn" class="btn secondary">Copy</button>
        </div>
        <textarea id="jsonOutput" readonly placeholder="Simplified structure will appear here..."></textarea>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>

</html>
